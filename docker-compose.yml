version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_REPO=${GIT_REPO}
        - GIT_BRANCH=${GIT_BRANCH:-main}
        - GIT_USERNAME=${GIT_USERNAME}
        - GIT_PASSWORD=${GIT_PASSWORD}
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - NEXT_PUBLIC_STACK_PROJECT_ID=${NEXT_PUBLIC_STACK_PROJECT_ID}
      - NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY}
      - STACK_SECRET_SERVER_KEY=${STACK_SECRET_SERVER_KEY}
      - QR_CODE_BASE_URL=${QR_CODE_BASE_URL}
      - PAYCO_AUTH_URL=${PAYCO_AUTH_URL}
      - PAYCO_CLIENT_ID=${PAYCO_CLIENT_ID}
      - PAYCO_CLIENT_SECRET=${PAYCO_CLIENT_SECRET}
      - PAYCO_WEBHOOK_URL=${PAYCO_WEBHOOK_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    labels:
      - traefik.enable=true
      - traefik.http.routers.parkpag.rule=Host(`parkpag.levantti.com.br`)
      - traefik.http.routers.parkpag.entrypoints=web,websecure
      - traefik.http.routers.parkpag.tls.certresolver=leresolver
      - traefik.http.routers.parkpag.service=parkpag
      - traefik.http.services.parkpag.loadbalancer.server.port=3000
      - traefik.http.services.parkpag.loadbalancer.passHostHeader=true
    depends_on:
      - postgres
    networks:
      - park-pag-network
    command: >
      sh -c "apk add --no-cache bash && npm run setup:db && npm run start:prod"

  postgres:
    image: postgres:15
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - park-pag-network

networks:
  park-pag-network:
    external: true

volumes:
  postgres_data:
